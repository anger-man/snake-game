<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 32px 40px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score {
      font-size: 1rem;
      color: #555;
      letter-spacing: 0.1em;
    }

    .score span {
      color: #667eea;
      font-weight: bold;
    }

    #muteBtn {
      background: none;
      border: 2px solid #667eea;
      color: #667eea;
      border-radius: 8px;
      padding: 4px 12px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    #muteBtn:hover {
      background: #667eea;
      color: white;
    }

    .canvas-wrap {
      position: relative;
    }

    canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.4), inset 0 0 0 2px #1a1a2e;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 20, 0.85);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      color: white;
    }

    .overlay.hidden { display: none; }

    .overlay h2 {
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: #a78bfa;
    }

    .overlay p {
      font-size: 1rem;
      color: #ccc;
      letter-spacing: 0.08em;
    }

    .overlay button {
      margin-top: 8px;
      padding: 10px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .overlay button:hover { opacity: 0.9; transform: scale(1.04); }
    .overlay button:active { transform: scale(0.97); }

    .hint {
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>SNAKE</h1>
    <div class="hud">
      <div class="score">SCORE: <span id="scoreVal">0</span> &nbsp; HIGH: <span id="highVal">0</span></div>
      <button id="muteBtn">♪ MUTE</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="c" width="400" height="400"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="overlayTitle">SNAKE</h2>
        <p id="overlayMsg">Use arrow keys to move</p>
        <button id="startBtn">START GAME</button>
      </div>
    </div>
    <div class="hint">Arrow keys to steer &nbsp;·&nbsp; eat the red food &nbsp;·&nbsp; don't crash</div>
  </div>

  <script>
    const COLS = 20, ROWS = 20, CELL = 20;
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // ── Colors ──────────────────────────────────────────────
    const COLOR = {
      bg:       '#0d0d1a',
      grid:     '#131325',
      snake:    '#4ade80',
      snakeEye: '#0d0d1a',
      head:     '#86efac',
      food:     '#f87171',
      foodGlow: 'rgba(248,113,113,0.5)',
    };

    // ── State ────────────────────────────────────────────────
    let snake, dir, nextDir, food, score, highScore = 0, loopId, speed, tickCount;
    let gameRunning = false;

    // ── Audio ────────────────────────────────────────────────
    let audioCtx = null, muted = false, musicScheduled = false;
    let musicTimeout = null;

    // Tetris A-theme (Korobeiniki) — note frequencies and durations (beats)
    const BPM = 160;
    const BEAT = 60 / BPM;
    const E4=329.63, B3=246.94, C4=261.63, D4=293.66, A3=220.00,
          A4=440.00, F4=349.23, G4=392.00, GS3=207.65, GS4=415.30;
    const melody = [
      [E4,1],[B3,.5],[C4,.5],[D4,1],[C4,.5],[B3,.5],
      [A3,1],[A3,.5],[C4,.5],[E4,1],[D4,.5],[C4,.5],
      [B3,1.5],[C4,.5],[D4,1],[E4,1],
      [C4,1],[A3,1],[A3,.5],[A3,.5],
      [0,.5],[B3,.5],[D4,1],[F4,.5],[A4,1],[G4,.5],[F4,.5],
      [E4,1.5],[C4,.5],[E4,1],[D4,.5],[C4,.5],
      [B3,1],[B3,.5],[C4,.5],[D4,1],[E4,1],
      [C4,1],[A3,1],[A3,1],[0,1],
    ];

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playNote(freq, startTime, duration) {
      if (muted || !audioCtx) return;
      if (freq === 0) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.08, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.9);
      osc.start(startTime);
      osc.stop(startTime + duration);
    }

    function scheduleMelody(startTime) {
      if (!audioCtx) return;
      let t = startTime;
      let totalDuration = 0;
      for (const [freq, beats] of melody) {
        playNote(freq, t, beats * BEAT * 0.92);
        t += beats * BEAT;
        totalDuration += beats * BEAT;
      }
      // Loop
      musicTimeout = setTimeout(() => {
        if (gameRunning && !muted) scheduleMelody(audioCtx.currentTime);
      }, (totalDuration - 0.1) * 1000);
    }

    function startMusic() {
      initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      clearTimeout(musicTimeout);
      scheduleMelody(audioCtx.currentTime + 0.05);
    }

    function stopMusic() {
      clearTimeout(musicTimeout);
    }

    document.getElementById('muteBtn').addEventListener('click', () => {
      muted = !muted;
      document.getElementById('muteBtn').textContent = muted ? '♪ UNMUTE' : '♪ MUTE';
      if (!muted && gameRunning) startMusic();
      else stopMusic();
    });

    // ── Game logic ───────────────────────────────────────────
    function randomFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      return pos;
    }

    function initGame() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      food = randomFood();
      score = 0;
      speed = 180;
      tickCount = 0;
      document.getElementById('scoreVal').textContent = 0;
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        if (score > highScore) highScore = score;
        document.getElementById('scoreVal').textContent = score;
        document.getElementById('highVal').textContent = highScore;
        food = randomFood();
        // Speed up every 5 food
        if (score % 5 === 0 && speed > 70) {
          speed = Math.max(70, speed - 10);
          clearInterval(loopId);
          loopId = setInterval(tick, speed);
        }
      } else {
        snake.pop();
      }

      draw();
    }

    function gameOver() {
      gameRunning = false;
      clearInterval(loopId);
      stopMusic();
      document.getElementById('overlayTitle').textContent = 'GAME OVER';
      document.getElementById('overlayMsg').textContent = `Score: ${score}`;
      document.getElementById('startBtn').textContent = 'PLAY AGAIN';
      document.getElementById('overlay').classList.remove('hidden');
    }

    function startGame() {
      initGame();
      gameRunning = true;
      document.getElementById('overlay').classList.add('hidden');
      clearInterval(loopId);
      loopId = setInterval(tick, speed);
      startMusic();
      draw();
    }

    document.getElementById('startBtn').addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp:    { x: 0, y: -1 },
        ArrowDown:  { x: 0, y: 1 },
        ArrowLeft:  { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
      };
      const d = map[e.key];
      if (!d) return;
      e.preventDefault();
      // Prevent 180° reversal
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
    });

    // ── Drawing ──────────────────────────────────────────────
    function draw() {
      // Background
      ctx.fillStyle = COLOR.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = COLOR.grid;
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      // Food glow
      ctx.shadowColor = COLOR.foodGlow;
      ctx.shadowBlur = 12;
      ctx.fillStyle = COLOR.food;
      ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);
      ctx.shadowBlur = 0;

      // Snake
      snake.forEach((seg, i) => {
        ctx.fillStyle = i === 0 ? COLOR.head : COLOR.snake;
        ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
      });
    }

    // Initial draw
    draw();
  </script>
</body>
</html>
